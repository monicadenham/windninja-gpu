# WindNinja Configuration File
# =============================

# Input elevation file (DEM)
elevation_file = input/dem.asc

# Initialization method
initialization_method = domainAverageInitialization

# Wind speed: 30 km/h
input_speed = 30
input_speed_units = kph

# Wind direction: desde el noroeste (315 grados)
# 0 = North, 90 = East, 180 = South, 270 = West, 315 = Northwest
input_direction = 315

# Vegetation type (required)
# Options: grass, brush, trees
vegetation = trees

# Output wind height (standard: 10 meters above ground)
output_wind_height = 10
units_output_wind_height = m

# Input wind height (standard: 10 meters above ground)
input_wind_height = 10
units_input_wind_height = m

# Number of threads for parallel processing
num_threads = 4

# Output options
output_speed_units = kph
diurnal_winds = 0

# Output files
write_ascii_output = 1
write_goog_output = 0
write_shapefile_output = 0
output_path = ./output/

# Mesh resolution (cell size in meters) - 30m para mayor precisión
mesh_resolution = 30
units_mesh_resolution = m
